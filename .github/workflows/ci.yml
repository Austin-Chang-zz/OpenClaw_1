name: OpenClaw CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── Backend checks ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: openclaw
          POSTGRES_PASSWORD: openclaw
          POSTGRES_DB: openclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://openclaw:openclaw@localhost:5432/openclaw_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check backend imports (startup smoke test)
        working-directory: backend
        run: python -c "from app.main import app; print('Backend import OK')"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/app/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,migrations

  # ── Frontend checks ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
